[cyber-lab]

enabled           = on
environment       = System
http_port         = 80
https_port        = 443
ip                = auto
nginx_engine      =
php_engine        = PHP-8.4
project_dir       = {base_dir}
project_url       = {host_scheme}://{host_decoded}{scheme_port}
public_dir        = {base_dir}\public
ssl               = on
ssl_cert_file     = auto
ssl_key_file      = auto
